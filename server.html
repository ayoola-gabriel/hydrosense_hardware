<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        h2 {
            color: #555;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #333;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <h2>Account</h2>
        <label for="email">Email:</label>
        <input type="text" id="email" placeholder="Enter email">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter password">
        <h2>WiFi Settings</h2>
        <label for="ssid">WiFi Name:</label>
        <input type="text" id="ssid" placeholder="Enter WiFi SSID">
        <label for="wifiPassword">WiFi Password:</label>
        <input type="password" id="wifiPassword" placeholder="Enter WiFi password">
        <button onclick="syncSettings()">Sync Setting</button>
    </div>
    <script>
        function syncSettings() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const ssid = document.getElementById('ssid').value;
            const wifiPassword = document.getElementById('wifiPassword').value;
            const params = new URLSearchParams({
                email: email,
                password: password,
                ssid: ssid,
                wifiPassword: wifiPassword
            });
            const baseUrl = window.location.origin; // Get the base URL of the current page
            const url = baseUrl + '/save?' + params.toString();
            console.log('Sending settings to server:', url);
            fetch(url, {
                method: 'GET'
            }).then(response => {
                if (response.ok) {
                    alert('Settings saved successfully!');
                } else {
                    alert('Failed to save settings.');
                }
            }).catch(error => {
                console.error('Error:', error);
                alert('Error saving settings.');
            });
        }
    </script>
</body>
</html>
